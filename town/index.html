<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Business Simulator — Distrito (protótipo 2D)</title>
<style>
  :root{
    --wood:#4a3524; --wood2:#3a2919; --wood-edge:#241810; --wood-hi:#6a4d33;
    --cream:#f2e4c8; --dim:#c9b48c; --gold:#e8c060; --green:#8fd07a; --red:#e08a6a;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:#1a140e;font-family:'Trebuchet MS','Segoe UI',system-ui,sans-serif;color:var(--cream);user-select:none}
  #c{position:fixed;inset:0;width:100%;height:100%;display:block;image-rendering:pixelated;image-rendering:crisp-edges;touch-action:none;cursor:grab}
  #c.drag{cursor:grabbing}
  .panel{position:fixed;background:linear-gradient(#4a3524,#3a2919);border:3px solid var(--wood-edge);border-radius:8px;
    box-shadow:inset 0 2px 0 var(--wood-hi),inset 0 -3px 0 #2a1d12,0 4px 10px rgba(0,0,0,.5);padding:8px 10px}
  .hud-top{top:10px;left:10px;display:flex;gap:14px;align-items:center;font-weight:700;font-size:15px;letter-spacing:.3px}
  .res{display:flex;gap:6px;align-items:center;white-space:nowrap}
  .res .ic{width:18px;height:18px;display:inline-block;image-rendering:pixelated}
  .hud-day{top:10px;right:10px;text-align:right;font-weight:700;font-size:14px;min-width:150px}
  .hud-day .ph{color:var(--gold);font-size:12px;letter-spacing:1px;text-transform:uppercase}
  .quest{top:64px;left:10px;max-width:230px}
  .quest .t{color:var(--gold);font-size:11px;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
  .quest .q{font-size:14px;font-weight:700;line-height:1.25}
  .obj{top:64px;right:10px;width:240px}
  .obj .row{margin:7px 0}
  .obj .lab{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:3px}
  .obj .lab b{color:var(--dim);font-weight:700}
  .bar{height:9px;background:#241810;border-radius:5px;overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,.6)}
  .bar i{display:block;height:100%;background:linear-gradient(#e8c060,#c89a3a);border-radius:5px}
  .bar.g i{background:linear-gradient(#8fd07a,#5aa04a)}
  .toolbar{bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px;padding:7px 8px}
  .tool{width:70px;height:58px;background:linear-gradient(#5a4230,#443019);border:2px solid var(--wood-edge);border-radius:7px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;
    box-shadow:inset 0 2px 0 var(--wood-hi);transition:transform .06s,filter .1s}
  .tool:hover{filter:brightness(1.12)} .tool:active{transform:translateY(2px)}
  .tool.on{background:linear-gradient(#7a5a38,#5a4022);box-shadow:inset 0 0 0 2px var(--gold),inset 0 2px 0 var(--wood-hi)}
  .tool .ti{font-size:22px;line-height:1} .tool .tl{font-size:10.5px;font-weight:700;color:var(--dim)}
  .tool .badge{position:absolute;margin:-42px 0 0 44px;background:var(--red);color:#3a1810;font-size:10px;font-weight:800;border-radius:8px;padding:0 4px;border:1px solid #7a2a18}
  .mini{bottom:78px;right:12px;width:132px;height:104px;padding:5px}
  .mini canvas{width:100%;height:100%;image-rendering:pixelated;border-radius:4px;border:2px solid var(--wood-edge)}
  .hint{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(20,14,8,.85);border:1px solid var(--wood-hi);
    border-radius:6px;padding:6px 12px;font-size:13px;color:var(--cream);pointer-events:none;opacity:0;transition:opacity .3s}
  .hint.on{opacity:1}
  /* build tray */
  .tray{position:fixed;left:50%;transform:translateX(-50%);bottom:80px;display:none;gap:6px;padding:8px}
  .tray.on{display:flex}
  .card{width:96px;background:linear-gradient(#5a4230,#443019);border:2px solid var(--wood-edge);border-radius:7px;padding:7px 6px;text-align:center;cursor:pointer;box-shadow:inset 0 2px 0 var(--wood-hi)}
  .card:hover{filter:brightness(1.12)}
  .card canvas{width:56px;height:56px;image-rendering:pixelated}
  .card .cn{font-size:11px;font-weight:700;margin-top:2px}
  .card .cc{font-size:11px;color:var(--gold);font-weight:700}
  .card.no{opacity:.5;cursor:not-allowed}
  #toast{position:fixed;top:104px;left:50%;transform:translateX(-50%);background:rgba(20,14,8,.92);border:2px solid var(--gold);
    border-radius:8px;padding:8px 16px;font-weight:700;font-size:14px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:20}
  #toast.on{opacity:1}
  .scrim{position:fixed;inset:0;background:rgba(10,7,4,.55);z-index:29}
  .modal{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);width:min(430px,92vw);max-height:86vh;overflow:auto;z-index:30}
  .mh{color:var(--gold);font-weight:800;font-size:17px;margin-bottom:8px}
  .mb{font-size:14px;line-height:1.4} .mb p{margin:4px 0}
  .mact{display:flex;flex-direction:column;gap:6px;margin-top:10px}
  .mbtn{background:linear-gradient(#5a4230,#443019);border:2px solid var(--wood-edge);border-radius:7px;color:var(--cream);padding:9px 10px;text-align:left;cursor:pointer;box-shadow:inset 0 2px 0 var(--wood-hi);font:inherit}
  .mbtn:hover{filter:brightness(1.12)} .mbtn b{display:block;font-size:14px} .mbtn span{display:block;font-size:11.5px;color:var(--dim)}
  .mbtn.dis{opacity:.5;cursor:not-allowed}
  .kpis{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:6px 0}
  .kpi{background:#241810;border:1px solid var(--wood-hi);border-radius:6px;padding:5px 8px}
  .kpi .k{font-size:10.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px} .kpi .v{font-size:16px;font-weight:800}
  .tag{display:inline-block;background:#241810;border:1px solid var(--wood-hi);border-radius:6px;padding:1px 6px;font-size:11px;margin-right:4px;color:var(--dim)}
  .lrow{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:8px;border-bottom:1px dashed #3a2919;cursor:pointer;font-size:13px}
  .lrow:hover{background:rgba(255,255,255,.04)} .dim{color:var(--dim)} .small{font-size:12px;color:var(--dim)}
  .lab{display:flex;justify-content:space-between;font-size:12.5px;margin:6px 0 3px}
  @media (max-height:470px){ .mini{display:none} .obj{width:210px} }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="panel hud-top" id="hudTop"></div>
<div class="panel hud-day"><div id="dayTxt">Dia 1 · Primavera</div><div class="ph" id="phaseTxt">Sobrevivência</div></div>
<div class="panel quest"><div class="t">Missão atual</div><div class="q" id="questTxt">Funde sua primeira empresa</div></div>
<div class="panel obj" id="objPanel"></div>

<div class="tray" id="tray"></div>
<div class="panel toolbar" id="toolbar"></div>
<div class="panel mini"><canvas id="mini" width="132" height="104"></canvas></div>
<div class="hint" id="hint"></div>
<div id="toast"></div>

<script>
/* ============================================================
   Business Simulator — Distrito · protótipo 2D top-down (pixel art)
   Núcleo visual primeiro: mapa + prédios + funcionários + HUD.
   (economia Business Simulator entra na próxima etapa)
   ============================================================ */
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
let W=innerWidth, H=innerHeight, DPR=Math.min(devicePixelRatio||1,2);
function resize(){W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);ctx.imageSmoothingEnabled=false;}
addEventListener('resize',resize);resize();

/* ---- pixel helpers ---- */
const AP=3;                 // art-pixel = 3 screen px
const TILE=16*AP;           // 48px tiles (16 art-px)
function makeCanvas(w,h){const c=document.createElement('canvas');c.width=w;c.height=h;const g=c.getContext('2d');g.imageSmoothingEnabled=false;return {c,g};}
// draw art-pixel rect onto ctx g (coords in art-pixels)
function P(g,x,y,w,h,col){g.fillStyle=col;g.fillRect(x*AP,y*AP,w*AP,h*AP);}
function roundRect(g,x,y,w,h,r){g.beginPath();g.moveTo(x+r,y);g.arcTo(x+w,y,x+w,y+h,r);g.arcTo(x+w,y+h,x,y+h,r);g.arcTo(x,y+h,x,y,r);g.arcTo(x,y,x+w,y,r);g.closePath();}
function rngSeed(s){return ()=>{s=(s*1103515245+12345)&0x7fffffff;return s/0x7fffffff;};}
function tileHash(x,y,n){let h=(x*374761393+y*668265263)|0;h=(h^(h>>>13))*1274126177;h^=h>>>16;return ((h>>>0)%n+n)%n;} // hash determinístico (evita padrão diagonal do módulo linear)
function paintSoftShadow(g,cx,cy,rx,ry,alpha){ // sombra elíptica suave (gradiente), coords em art-pixels como P()
  cx*=AP;cy*=AP;rx*=AP;ry*=AP;const rad=Math.max(rx,ry);
  const grd=g.createRadialGradient(cx,cy,0,cx,cy,rad);
  grd.addColorStop(0,'rgba(0,0,0,'+alpha+')');grd.addColorStop(0.65,'rgba(0,0,0,'+(alpha*0.5)+')');grd.addColorStop(1,'rgba(0,0,0,0)');
  g.save();g.translate(cx,cy);g.scale(rx/rad,ry/rad);g.translate(-cx,-cy);
  g.fillStyle=grd;g.beginPath();g.arc(cx,cy,rad,0,7);g.fill();g.restore();
}

/* ---- palette ---- */
const COL={
  grass:['#6a9a3f','#5f9038','#74a447','#5a8a34','#7fae52','#527c30'], grassDot:['#7cad4a','#537f30'],
  path:'#a07c4c', path2:'#916d3f', pathEdge:'#7a5a34',
  plaza:'#b9a888', plaza2:'#a89877',
  water:'#4a82ad', water2:'#5a92bd',
};

/* ---- tile sprites (pre-rendered) ---- */
function grassTile(seed){const {c,g}=makeCanvas(TILE,TILE);const r=rngSeed(seed);
  g.fillStyle=COL.grass[(r()*COL.grass.length)|0];g.fillRect(0,0,TILE,TILE);
  for(let i=0;i<10;i++){const x=(r()*16)|0,y=(r()*16)|0;P(g,x,y,1,1,COL.grassDot[(r()*2)|0]);}
  // occasional tufts / flowers
  if(r()<0.28){const x=(r()*12+2)|0,y=(r()*12+2)|0;P(g,x,y,1,2,'#3f6a2a');P(g,x+1,y,1,2,'#3f6a2a');}
  if(r()<0.12){const x=(r()*12+2)|0,y=(r()*12+2)|0;const fc=['#e8d84a','#e88a8a','#d8d8f0'][(r()*3)|0];P(g,x,y,1,1,fc);P(g,x,y-1,1,1,'#6a9a3f');}
  if(r()<0.16){const x=(r()*10+3)|0,y=(r()*10+3)|0;P(g,x,y,2,1,'#7a6440');P(g,x,y+1,1,1,'#6a5636');} // remendo de terra à mostra (variação natural)
  return c;}
function pathTile(seed){const {c,g}=makeCanvas(TILE,TILE);const r=rngSeed(seed);
  g.fillStyle=COL.path;g.fillRect(0,0,TILE,TILE);
  for(let i=0;i<16;i++){const x=(r()*16)|0,y=(r()*16)|0;P(g,x,y,1,1,r()<.5?COL.path2:'#b08a56');}
  for(let i=0;i<3;i++){const x=(r()*14)|0,y=(r()*14)|0;P(g,x,y,2,1,'#8a6838');}
  return c;}
function plazaTile(seed){const {c,g}=makeCanvas(TILE,TILE);const r=rngSeed(seed);
  g.fillStyle=COL.plaza;g.fillRect(0,0,TILE,TILE);
  // paving grid
  for(let i=0;i<16;i+=8)for(let j=0;j<16;j+=8){P(g,i,j,7,7,r()<.5?COL.plaza2:COL.plaza);}
  P(g,0,0,16,1,'#8a7a5a');P(g,0,8,16,1,'#8a7a5a');P(g,0,0,1,16,'#8a7a5a');P(g,8,0,1,16,'#8a7a5a');
  return c;}
function waterTile(seed){const {c,g}=makeCanvas(TILE,TILE);const r=rngSeed(seed);
  g.fillStyle=COL.water;g.fillRect(0,0,TILE,TILE);
  for(let i=0;i<6;i++){const x=(r()*13)|0,y=(r()*14)|0;P(g,x,y,3,1,COL.water2);}
  return c;}

const tileCache={grass:[],path:[],plaza:[],water:[]};
for(let i=0;i<12;i++){tileCache.grass.push(grassTile(1000+i*7));tileCache.path.push(pathTile(2000+i*7));tileCache.plaza.push(plazaTile(3000+i*7));tileCache.water.push(waterTile(4000+i*7));}

/* ---- decor: trees / rocks (pre-rendered, drawn above ground) ---- */
function treeSprite(seed){const S=22;const {c,g}=makeCanvas(S*AP,S*AP);const r=rngSeed(seed);
  paintSoftShadow(g,11,20,7,2.4,0.30);
  // trunk
  P(g,10,15,2,5,'#6b4a2a');P(g,10,15,1,5,'#7d5a34');
  // foliage clusters
  const gy=['#3f7a3a','#4f8f45','#357030'];
  const blobs=[[11,7,6],[7,9,5],[15,9,5],[9,5,4],[13,5,4],[11,11,5]];
  for(const [x,y,rad] of blobs){g.fillStyle=gy[(r()*3)|0];g.beginPath();g.arc(x*AP,y*AP,rad*AP,0,7);g.fill();}
  // highlights
  for(let i=0;i<10;i++){const x=(r()*10+6)|0,y=(r()*8+3)|0;P(g,x,y,1,1,'#6aad5a');}
  return {c,ox:11,oy:19};}
function rockSprite(seed){const S=12;const {c,g}=makeCanvas(S*AP,S*AP);const r=rngSeed(seed);
  paintSoftShadow(g,6,9.5,5,1.8,0.26);
  P(g,3,4,6,5,'#8a8f96');P(g,3,4,6,1,'#a6abb2');P(g,3,8,6,1,'#6a6f76');P(g,4,5,2,2,'#b6bbc2');
  return {c,ox:6,oy:9};}
function fountainSprite(){const S=18;const {c,g}=makeCanvas(S*AP,S*AP);
  paintSoftShadow(g,9,15,8,2.2,0.30);
  P(g,2,8,14,7,'#9a9088');P(g,2,8,14,1,'#b0a69a');P(g,2,14,14,1,'#7a7068');
  P(g,3,10,12,4,'#4a82ad');P(g,3,10,12,1,'#6aa0cd');            // basin + water
  P(g,8,4,2,6,'#8a8078');P(g,7,3,4,2,'#9a9088');                // spout
  P(g,6,5,1,1,'#8fc0e8');P(g,11,6,1,1,'#8fc0e8');P(g,9,4,1,1,'#bfe0f4');
  return {c,ox:9,oy:15};}
const treeSprites=[treeSprite(11),treeSprite(23),treeSprite(37),treeSprite(51)];
const rockSprites=[rockSprite(9),rockSprite(19)];
function lampSprite(){const S=6,SH=20;const {c,g}=makeCanvas(S*AP,SH*AP);
  paintSoftShadow(g,3,18.5,2.6,1,0.24);
  P(g,2,4,2,15,'#3a3026');P(g,2,4,1,15,'#4a4032');           // poste
  P(g,1,1,4,4,'#2a241c');P(g,1,1,4,1,'#4a4032');             // luminária
  P(g,2,2,2,2,'#ffe6a0');                                     // luz quente
  return {c,ox:3,oy:18};}
function cropSprite(seed){const S=TILE/AP,r=rngSeed(seed);const {c,g}=makeCanvas(TILE,TILE);
  g.fillStyle='#7a5a38';g.fillRect(0,0,TILE,TILE);                  // terra arada
  for(let y=2;y<16;y+=3){P(g,1,y,14,1,'#6a4a2a');for(let x=2;x<15;x+=3)P(g,x,y-1,1,1,r()<.7?'#4f8f45':'#6aad5a');} // sulcos + brotos
  return c;}
function wellSprite(){const {c,g}=makeCanvas(14*AP,16*AP);
  paintSoftShadow(g,7,14,6,2,0.28);
  P(g,2,8,10,6,'#8a8078');P(g,2,8,10,1,'#a09890');P(g,2,13,10,1,'#6a6058');   // parede de pedra
  P(g,3,9,8,4,'#2f2822');P(g,3,9,8,2,'#4a82ad');                              // buraco + água
  P(g,2,2,2,7,'#6a4a2a');P(g,10,2,2,7,'#6a4a2a');                             // postes do telhado
  P(g,1,1,12,3,'#8a4a3a');P(g,1,1,12,1,'#a05a48');P(g,6,3,2,5,'#5a3a24');     // telhado + balde
  return {c,ox:7,oy:14};}
function barrelSprite(){const {c,g}=makeCanvas(8*AP,10*AP);
  paintSoftShadow(g,4,8.5,4,1.4,0.26);
  P(g,1,1,6,8,'#8a5a34');P(g,1,1,6,1,'#a06a40');P(g,1,3,6,1,'#5a3a20');P(g,1,6,6,1,'#5a3a20');P(g,3,1,1,8,'#a06a40'); return {c,ox:4,oy:8};}
function crateSprite(){const {c,g}=makeCanvas(9*AP,9*AP);
  paintSoftShadow(g,4.5,7.5,4,1.4,0.24);
  P(g,1,1,7,7,'#a07a44');P(g,1,1,7,1,'#b88a50');P(g,1,1,1,7,'#8a6838');P(g,7,1,1,7,'#8a6838');P(g,1,7,7,1,'#8a6838');P(g,4,1,1,7,'#8a6838');P(g,1,4,7,1,'#8a6838'); return {c,ox:4,oy:7};}
function fenceHspr(){const {c,g}=makeCanvas(TILE,10*AP);
  P(g,1,2,2,7,'#6a4a2a');P(g,13,2,2,7,'#6a4a2a');P(g,1,2,2,1,'#8a6440');P(g,13,2,2,1,'#8a6440');   // postes
  P(g,0,3,16,1,'#8a6440');P(g,0,6,16,1,'#7a5836');                                                  // travessas
  return {c,ox:8,oy:8};}
function fenceVspr(){const {c,g}=makeCanvas(6*AP,TILE);
  P(g,2,1,2,14,'#6a4a2a');P(g,2,1,2,1,'#8a6440');P(g,1,4,4,1,'#8a6440');P(g,1,10,4,1,'#7a5836');
  return {c,ox:3,oy:14};}
const fountain=fountainSprite(), lamp=lampSprite(), well=wellSprite(), barrel=barrelSprite(), crate=crateSprite(), fH=fenceHspr(), fV=fenceVspr();
const cropTiles=[cropSprite(501),cropSprite(517),cropSprite(533)];
function fenceRing(fx,fy,fw,fh){ // cerca no anel de fora do retângulo (só em grama)
  const put=(gx,gy,spr)=>{if(map[gy]&&map[gy][gx]===0&&!buildingAt(gx,gy))decor.push({kind:'fence',gx,gy,spr});};
  for(let x=-1;x<=fw;x++){put(fx+x,fy-1,fH);put(fx+x,fy+fh,fH);}
  for(let y=0;y<fh;y++){put(fx-1,fy+y,fV);put(fx+fw,fy+y,fV);}
}
/* ---- moldura do mapa: montanhas + mata densa (o cenário nunca "corta" abrupto na borda) ---- */
function mountainSprite(seed){const S=26,SH=22;const {c,g}=makeCanvas(S*AP,SH*AP);const r=rngSeed(seed);
  paintSoftShadow(g,13,SH-2,10,3,0.24);
  g.fillStyle='#5f6a78';g.beginPath();g.moveTo(2*AP,(SH-3)*AP);g.lineTo(13*AP,3*AP);g.lineTo(24*AP,(SH-3)*AP);g.closePath();g.fill();
  g.fillStyle='#79838f';g.beginPath();g.moveTo(13*AP,3*AP);g.lineTo(7*AP,(SH-3)*AP);g.lineTo(13*AP,(SH-6)*AP);g.closePath();g.fill(); // faceta iluminada
  g.fillStyle='#e8ecf2';g.beginPath();g.moveTo(13*AP,3*AP);g.lineTo(9.5*AP,9*AP);g.lineTo(16.5*AP,9*AP);g.closePath();g.fill();       // neve no topo
  g.fillStyle='#f4f7fa';g.beginPath();g.moveTo(13*AP,3*AP);g.lineTo(11.5*AP,6.5*AP);g.lineTo(14.5*AP,6.5*AP);g.closePath();g.fill();
  return {c,ox:13,oy:SH-2};}
function denseTreeSprite(seed){const S=24;const {c,g}=makeCanvas(S*AP,S*AP);const r=rngSeed(seed);
  paintSoftShadow(g,12,S-3,9,2.6,0.28);
  P(g,11,15,2,6,'#43301d');
  const gy=['#2f5f2c','#3a6f36','#265424'];
  const blobs=[[12,8,7],[7,10,6],[17,10,6],[9,5,5],[15,5,5],[12,12,6]];
  for(const [x,y,rad] of blobs){g.fillStyle=gy[(r()*3)|0];g.beginPath();g.arc(x*AP,y*AP,rad*AP,0,7);g.fill();}
  for(let i=0;i<8;i++){const x=(r()*10+6)|0,y=(r()*8+3)|0;P(g,x,y,1,1,'#4f8f45');}
  return {c,ox:12,oy:S-3};}
function farGroundTile(seed){const {c,g}=makeCanvas(TILE,TILE);const r=rngSeed(seed);
  const tones=['#3f5a34','#39522f','#43603a'];
  g.fillStyle=tones[(r()*tones.length)|0];g.fillRect(0,0,TILE,TILE);
  for(let i=0;i<8;i++){const x=(r()*16)|0,y=(r()*16)|0;P(g,x,y,1,1,'#2d4526');}
  return c;}

function genWorld(){
  const rr=rngSeed(777);
  for(let y=0;y<MAPH;y++){map[y]=[];for(let x=0;x<MAPW;x++){map[y][x]=0;}}

  const cxA=Math.floor(MAPW*0.5), cyA=Math.floor(MAPH*0.42);
  for(let x=0;x<MAPW;x++){map[cyA][x]=1;map[cyA+1][x]=1;}
  for(let y=0;y<MAPH;y++){map[y][cxA]=1;map[y][cxA+1]=1;}
  // a central plaza at the cross
  for(let y=cyA-1;y<=cyA+2;y++)for(let x=cxA-1;x<=cxA+2;x++)if(map[y]&&map[y][x]!=null)map[y][x]=2;
  // a pond
  for(let y=6;y<10;y++)for(let x=34;x<39;x++){if(rr()<.85)map[y][x]=3;}
  // scatter trees (avoid roads/buildings later)
  for(let i=0;i<150;i++){const gx=(rr()*MAPW)|0,gy=(rr()*MAPH)|0;if(map[gy][gx]===0){decor.push({kind:'tree',gx,gy,spr:treeSprites[(rr()*treeSprites.length)|0]});}}
  for(let i=0;i<24;i++){const gx=(rr()*MAPW)|0,gy=(rr()*MAPH)|0;if(map[gy][gx]===0)decor.push({kind:'rock',gx,gy,spr:rockSprites[(rr()*rockSprites.length)|0]});}
  // fountain centerpiece in the plaza
  decor.push({kind:'fountain',gx:cxA,gy:cyA,spr:fountain});
  // sede do jogador (marco) + empresas iniciais do distrito — fundadas com a economia Business Simulator de verdade
  placeSede(cxA-4,cyA-4);
  const starters=[['ai',cxA+3,cyA-5,3],['saas',cxA-8,cyA+3,2],['logi',cxA+3,cyA+3,4],['retail',cxA-5,cyA+3,2],['fintech',cxA-8,cyA-5,2],['media',cxA+7,cyA+3,2],['health',cxA+7,cyA-5,3]];
  for(const st of starters){const co=foundCompany(st[0],st[1],st[2],0,true);for(let k=0;k<st[3];k++)addEmployee(co);}
  // postes de luz ao longo das avenidas (só em grama livre, fora de prédios)
  for(let x=3;x<MAPW-2;x+=5){for(const gy of [cyA-1,cyA+2]){if(map[gy]&&map[gy][x]===0&&!buildingAt(x,gy))decor.push({kind:'lamp',gx:x,gy,spr:lamp});}}
  for(let y=3;y<MAPH-2;y+=5){for(const gx of [cxA-1,cxA+2]){if(map[y]&&map[y][gx]===0&&!buildingAt(gx,y))decor.push({kind:'lamp',gx,gy:y,spr:lamp});}}
  // hortas/campos (como a vila de referência)
  for(const cp of [[cxA-13,cyA+6],[cxA-13,cyA+9]]){for(let y=0;y<3;y++)for(let x=0;x<4;x++){const gx=cp[0]+x,gy=cp[1]+y;if(map[gy]&&map[gy][gx]===0){map[gy][gx]=4;for(let i=decor.length-1;i>=0;i--)if(decor[i].gx===gx&&decor[i].gy===gy)decor.splice(i,1);}}}
  // props: poço, cerca na horta, barris e engradados (fidelidade ao print)
  fenceRing(cxA-13,cyA+6,4,6);
  const putDecor=(gx,gy,spr)=>{if(map[gy]&&map[gy][gx]===0&&!buildingAt(gx,gy)){for(let i=decor.length-1;i>=0;i--)if(decor[i].gx===gx&&decor[i].gy===gy)decor.splice(i,1);decor.push({kind:'prop',gx,gy,spr});}};
  putDecor(cxA-3,cyA-3,well);
  [[cxA+2,cyA-6],[cxA+6,cyA+2],[cxA-6,cyA+2],[cxA-9,cyA-6],[cxA+9,cyA+6]].forEach(p=>putDecor(p[0],p[1],barrel));
  [[cxA-7,cyA+2],[cxA+7,cyA+2],[cxA+2,cyA+6],[cxA-3,cyA-6]].forEach(p=>putDecor(p[0],p[1],crate));
  // moldura do mapa: montanhas (topo/esquerda, como a referência) + mata densa (demais lados) — 2 fileiras de profundidade
  const rb=rngSeed(9001);
  for(let x=-2;x<MAPW+2;x++){
    for(const gy of [-1,-2]){const j=rb()*0.7-0.35; if(rb()<0.68)decor.push({kind:'mtn',gx:x+j,gy,spr:pick(mountainSprites)});else decor.push({kind:'ftree',gx:x+j,gy,spr:pick(denseTreeSprites)});}
    for(const gy of [MAPH,MAPH+1]){const j=rb()*0.7-0.35; if(rb()<0.85)decor.push({kind:'ftree',gx:x+j,gy,spr:pick(denseTreeSprites)});}
  }
  for(let y=-2;y<MAPH+2;y++){
    for(const gx of [-1,-2]){const j=rb()*0.7-0.35; if(rb()<0.55)decor.push({kind:'mtn',gx,gy:y+j,spr:pick(mountainSprites)});else decor.push({kind:'ftree',gx,gy:y+j,spr:pick(denseTreeSprites)});}
    for(const gx of [MAPW,MAPW+1]){const j=rb()*0.7-0.35; if(rb()<0.85)decor.push({kind:'ftree',gx,gy:y+j,spr:pick(denseTreeSprites)});}
  }
  // pedestres ambientes (vida na praça)
  const sedeB=buildings[0];for(let k=0;k<8;k++)spawnWorker(sedeB,null);
  // VOCÊ — o herói, no centro do distrito (perto da fonte)
  hero={x:(cxA+0.5)*TILE, y:(cyA+3.4)*TILE, tx:0,ty:0, spd:70, moving:false, face:1, ph:Math.random()*6};
  hero.tx=hero.x; hero.ty=hero.y;
}
function footprintFree(type,gx,gy){const s=BSPRITES[type];for(let y=gy;y<gy+s.ht;y++)for(let x=gx;x<gx+s.wt;x++){if(x<0||y<0||x>=MAPW||y>=MAPH)return false;if(map[y][x]===3)return false;}
  for(const b of buildings){const bs=BSPRITES[b.type];if(gx<b.gx+bs.wt&&gx+s.wt>b.gx&&gy<b.gy+bs.ht&&gy+s.ht>b.gy)return false;}return true;}
function placeBuilding(type,gx,gy){const s=BSPRITES[type];
  // clear decor under footprint
  for(let i=decor.length-1;i>=0;i--){const d=decor[i];if(d.gx>=gx-1&&d.gx<gx+s.wt&&d.gy>=gy-1&&d.gy<gy+s.ht)decor.splice(i,1);}
  const b={type,gx,gy};buildings.push(b);return b;}
function buildingAt(gx,gy){for(const b of buildings){const s=BSPRITES[b.type];if(gx>=b.gx&&gx<b.gx+s.wt&&gy>=b.gy&&gy<b.gy+s.ht)return b;}return null;}
function spawnWorker(b,co){const s=BSPRITES[b.type];const cx=(b.gx+s.wt/2)*TILE,cy=(b.gy+s.ht/2)*TILE;
  const w={x:cx+(Math.random()*2-1)*TILE,y:cy+(Math.random()*1.5)*TILE,tx:0,ty:0,spd:16+Math.random()*10,spr:workerCache[(Math.random()*workerCache.length)|0],home:{cx,cy},co:co||null,ph:Math.random()*6,moving:false,face:1,pause:0};
  pickTarget(w);workers.push(w);return w;}
function removeWorker(co){for(let i=workers.length-1;i>=0;i--){if(workers[i].co===co){workers.splice(i,1);return;}}}
function pickTarget(w){w.tx=w.home.cx+(Math.random()*4-2)*TILE;w.ty=w.home.cy+(Math.random()*3-0.5)*TILE;}

/* ============================ CAMERA ============================ */
let camX=0,camY=0; let hero=null;
let vignetteImg=null,vignetteW=0,vignetteH=0;
function ensureVignette(){ // cacheada; só regenera no resize (1 gradiente, não por frame)
  if(vignetteImg&&vignetteW===W&&vignetteH===H)return;
  vignetteW=W;vignetteH=H;const {c,g}=makeCanvas(W,H);
  const vg=g.createRadialGradient(W/2,H/2,Math.min(W,H)*0.35,W/2,H/2,Math.max(W,H)*0.72);
  vg.addColorStop(0,'rgba(10,14,8,0)');vg.addColorStop(1,'rgba(6,10,5,0.4)');
  g.fillStyle=vg;g.fillRect(0,0,W,H);vignetteImg=c;
}
function clampCam(){const worldW=MAPW*TILE,worldH=MAPH*TILE;camX=Math.max(-40,Math.min(worldW-W+40,camX));camY=Math.max(-40,Math.min(worldH-H+40,camY));}
function centerCam(){camX=(MAPW*TILE-W)/2;camY=(MAPH*TILE-H)/2-40;clampCam();}
function centerOnHero(){if(!hero)return centerCam();camX=hero.x-W/2;camY=hero.y-H/2;clampCam();}

/* ============================ RENDER ============================ */
function draw(){
  ctx.clearRect(0,0,W,H);
  // sky/ground base
  ctx.fillStyle='#2a3a1e';ctx.fillRect(0,0,W,H);
  const vx0=Math.floor(camX/TILE), vy0=Math.floor(camY/TILE);
  const vx1=Math.ceil((camX+W)/TILE), vy1=Math.ceil((camY+H)/TILE);
  // moldura: terreno "distante" fora do mapa jogável — nunca revela cor chapada na borda
  for(let y=vy0;y<vy1;y++)for(let x=vx0;x<vx1;x++){
    if(x>=0&&x<MAPW&&y>=0&&y<MAPH)continue;
    const img=farTiles[tileHash(x,y,farTiles.length)];
    ctx.drawImage(img,Math.round(x*TILE-camX),Math.round(y*TILE-camY));
  }
  const x0=Math.max(0,vx0), y0=Math.max(0,vy0);
  const x1=Math.min(MAPW,vx1), y1=Math.min(MAPH,vy1);
  // tiles
  for(let y=y0;y<y1;y++)for(let x=x0;x<x1;x++){
    const t=map[y][x];const arr=t===1?tileCache.path:t===2?tileCache.plaza:t===3?tileCache.water:t===4?cropTiles:tileCache.grass;
    const img=arr[tileHash(x,y,arr.length)];
    const px=Math.round(x*TILE-camX),py=Math.round(y*TILE-camY);
    ctx.drawImage(img,px,py);
    // caminho/praça "cavados" na grama: aresta escura onde encostam em grama (fidelidade ao print)
    if(t===1||t===2){const soft=xx=>xx!==1&&xx!==2;const E=4,ec=t===1?'#6a4a28':'#8a7a5a';ctx.fillStyle=ec;
      if(!map[y-1]||soft(map[y-1][x]))ctx.fillRect(px,py,TILE,E);
      if(!map[y+1]||soft(map[y+1][x]))ctx.fillRect(px,py+TILE-E,TILE,E);
      if(soft(map[y][x-1]))ctx.fillRect(px,py,E,TILE);
      if(soft(map[y][x+1]))ctx.fillRect(px+TILE-E,py,E,TILE);
      // dither leve: quebra a linha reta da transição (mais orgânico, menos "colado")
      for(let k=0;k<4;k++){const hk=tileHash(x*97+k*13,y*89+k*7,TILE*TILE);const ex=hk%TILE,ey=(hk/TILE|0)%TILE;
        if(ex<E+3||ex>TILE-E-3||ey<E+3||ey>TILE-E-3)ctx.fillRect(px+ex,py+ey,2,2);}
    }
  }
  // depth-sorted sprites (decor + buildings + workers) by baseline y
  const ents=[];
  for(const d of decor){if(d.gx<x0-2||d.gx>x1+2||d.gy<y0-2||d.gy>y1+2)continue;ents.push({y:d.gy*TILE+TILE,draw:()=>{const sx=Math.round(d.gx*TILE-camX+TILE/2-d.spr.ox*AP),sy=Math.round(d.gy*TILE-camY+TILE-d.spr.oy*AP);ctx.drawImage(d.spr.c,sx,sy);}});}
  for(const b of buildings){const s=BSPRITES[b.type];ents.push({y:(b.gy+s.ht)*TILE,draw:()=>{const sx=Math.round(b.gx*TILE-camX+ (s.wt*TILE)/2 - s.ox*AP),sy=Math.round((b.gy+s.ht)*TILE-camY - s.oy*AP);ctx.drawImage(s.c,sx,sy);}});}
  for(const w of workers){ents.push({y:w.y,draw:()=>{const sp=w.spr;const bob=w.moving?Math.round(Math.abs(Math.sin(performance.now()*0.011+w.ph))*2*AP):0;
    const dx=Math.round(w.x-camX-6*AP),dy=Math.round(w.y-camY-16*AP)-bob;
    if(w.face<0){ctx.save();ctx.translate(dx+sp.width,dy);ctx.scale(-1,1);ctx.drawImage(sp,0,0);ctx.restore();}else ctx.drawImage(sp,dx,dy);}});}
  if(hero){const H=hero;ents.push({y:H.y+2,draw:()=>{
    const rx=Math.round(H.x-camX),ry=Math.round(H.y-camY);
    // anel dourado pulsante no chão — ajuda a localizar "você"
    const pulse=0.45+0.35*Math.sin(performance.now()*0.005);
    ctx.save();ctx.globalAlpha=pulse;ctx.strokeStyle='#e8c060';ctx.lineWidth=3;ctx.beginPath();ctx.ellipse(rx,ry,20,8,0,0,7);ctx.stroke();ctx.globalAlpha=1;ctx.restore();
    // sprite do herói (bob + direção)
    const bob=H.moving?Math.round(Math.abs(Math.sin(performance.now()*0.013+H.ph))*2*AP):0;
    const dx=Math.round(H.x-camX-7*AP),dy=Math.round(H.y-camY-18*AP)-bob;
    if(H.face<0){ctx.save();ctx.translate(dx+heroImg.width,dy);ctx.scale(-1,1);ctx.drawImage(heroImg,0,0);ctx.restore();}else ctx.drawImage(heroImg,dx,dy);
    // etiqueta VOCÊ acima da cabeça
    ctx.font='bold 12px Trebuchet MS,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    const tw=ctx.measureText('VOCÊ').width, ly=dy-16;
    ctx.fillStyle='rgba(20,14,8,0.88)';roundRect(ctx,rx-tw/2-7,ly,tw+14,17,6);ctx.fill();
    ctx.fillStyle='#e8c060';ctx.fillText('VOCÊ',rx,ly+9);
    ctx.beginPath();ctx.moveTo(rx-4,ly+17);ctx.lineTo(rx+4,ly+17);ctx.lineTo(rx,ly+21);ctx.fill();
  }});}
  ents.sort((a,b)=>a.y-b.y);
  for(const e of ents)e.draw();
  // placement ghost
  if(placing){drawGhost();}
  // vinheta sutil (moldura do enquadramento — cacheada, 1 blit por frame)
  ensureVignette();ctx.drawImage(vignetteImg,0,0);
}

let last=performance.now();
function loop(now){const dt=Math.min((now-last)/1000,0.05);last=now;
  for(const w of workers){const dx=w.tx-w.x,dy=w.ty-w.y,d=Math.hypot(dx,dy);
    if(d<3){w.moving=false;if(w.pause>0){w.pause-=dt;}else if(Math.random()<0.03){pickTarget(w);w.pause=rnd(0.4,2.2);}}
    else{w.moving=true;if(Math.abs(dx)>0.5)w.face=dx<0?-1:1;w.x+=dx/d*w.spd*dt;w.y+=dy/d*w.spd*dt;}}
  if(hero){const dx=hero.tx-hero.x,dy=hero.ty-hero.y,d=Math.hypot(dx,dy);
    if(d<2){hero.moving=false;}else{hero.moving=true;if(Math.abs(dx)>0.5)hero.face=dx<0?-1:1;const step=Math.min(hero.spd*dt,d);hero.x+=dx/d*step;hero.y+=dy/d*step;}}
  draw();drawMini();
  requestAnimationFrame(loop);}

const rnd=(a,b)=>a+Math.random()*(b-a), ri=(a,b)=>a+((Math.random()*(b-a+1))|0), chance=p=>Math.random()<p, clamp=(v,a,b)=>Math.max(a,Math.min(b,v)), pick=a=>a[(Math.random()*a.length)|0];
function money(n){n=Math.round(n);const s=n<0?'-':'';n=Math.abs(n);if(n>=1e6)return s+'$'+(n/1e6).toFixed(n>=1e7?0:1)+'M';if(n>=1e3)return s+'$'+(n/1e3).toFixed(n>=1e4?0:1)+'k';return s+'$'+n;}
function moneyFull(n){n=Math.round(n);const s=n<0?'-':'';return s+'$'+Math.abs(n).toLocaleString('pt-BR');}

let S={cash:8000,rep:{market:5,talent:5,public:6},skills:{negotiation:10,charisma:12,finance:8,leadership:8},
  market:{cycle:"estável",mult:1.0,rate:6.0,mood:0,target:1.0},phase:1,phaseName:"Sobrevivência",

let companies=[]; let sede=null; const FEED=[]; function log(h){FEED.unshift({d:S.day,h});if(FEED.length>30)FEED.length=30;}
const skillAvg=()=>(S.skills.negotiation+S.skills.charisma+S.skills.finance+S.skills.leadership)/4;
const roleFit=(e,n)=>!n?1:e.fam==="any"?1.05:e.fam===n.family?1.18:0.9;
function coName(n){const a=["Nova","Apex","Vertex","Lumen","Iron","Atlas","Meridian","Cobalt","Halcyon","Orion","Vanta","Praxis","Zenith"];const b={tech:["Labs","AI","Soft","Stack","Systems"],real:["Group","Works","Ind.","Log.","Build"],soft:["Media","Health","Studio","House"]};return pick(a)+" "+pick(b[n.family]);}
function coSynergy(co){const n=companies.length;if(n<=1)return 1;let s=1+Math.min(0.22,(n-1)*0.045);const nn=NICHES.find(x=>x.id===co.niche);if(nn&&companies.some(c=>c!==co&&(NICHES.find(x=>x.id===c.niche)||{}).family===nn.family))s+=0.06;return s;}
function coRevenue(co){const n=NICHES.find(x=>x.id===co.niche);let emp=0;co.employees.forEach(e=>emp+=e.competence*0.012*roleFit(e,n));const rep=1+(S.rep.market-5)*0.012+(S.rep.public-5)*0.006;const ops=0.45+co.ops/100*0.95;const f=1+(skillAvg()-8)*0.01;return Math.max(0,co.baseRev*(1+emp)*ops*S.market.mult*rep*f*co.scale*coSynergy(co));}
function coCosts(co){let s=0;co.employees.forEach(e=>s+=e.salary);return s+co.overhead;}
function coProfit(co){return coRevenue(co)-coCosts(co);}
function coValue(co){const n=NICHES.find(x=>x.id===co.niche);const annual=coProfit(co)*365;const mult=(6+(n?n.growth:1)*4)*(0.7+S.market.mult*0.4);return Math.max(0,Math.round(Math.max(coRevenue(co)*36,annual*mult/12)));}
function dailyExpenses(){return 40+6+S.phase*S.phase*4;}
function netWorth(){let n=S.cash;companies.forEach(c=>n+=coValue(c));return Math.round(n);}
function checkPhase(){const net=netWorth();for(let i=PHASES.length-1;i>=0;i--){const p=PHASES[i];if(net>=p.net&&(p.need!=="company"||companies.length>0)){if(p.n>S.phase){S.phase=p.n;S.phaseName=p.name;onPhaseUp(p);}break;}}}
function onPhaseUp(p){toast('🏆 Nova fase: '+p.name);if(p.n===5)S.won=true;}
function genPerson(){const role=pick(ROLES);return {id:'p'+Date.now()+ri(0,99999),name:pick(FIRST)+' '+pick(LAST),role:role.t,fam:role.fam,competence:ri(50,92),ambition:ri(35,90),salary:Math.round(rnd(80,200)),happy:60,tenure:0};}
/* founding & staffing (liga empresa <-> prédio <-> funcionários-sprites) */
function foundCompany(nicheId,gx,gy,cost,free){const n=NICHES.find(x=>x.id===nicheId);const base=rnd(n.base[0],n.base[1])*(0.9+skillAvg()*0.01);const b=placeBuilding(n.spr,gx,gy);
  const co={id:'co'+Date.now()+ri(0,999),niche:nicheId,name:coName(n),baseRev:base,ops:42,scale:1,employees:[],overhead:Math.round(base*0.3),age:0,b};b.co=co;companies.push(co);if(!free)S.cash-=cost;S.founded++;return co;}
function placeSede(gx,gy){const b=placeBuilding('hq',gx,gy);b.sede=true;sede=b;return b;}
function addEmployee(co,e){e=e||genPerson();co.employees.push(e);spawnWorker(co.b,co);S.hires++;return e;}
function removeCompany(co){companies=companies.filter(c=>c!==co);const bi=buildings.indexOf(co.b);if(bi>=0)buildings.splice(bi,1);for(let i=workers.length-1;i>=0;i--)if(workers[i].co===co)workers.splice(i,1);}
function findFreeSpot(type){const bx=sede?sede.gx:MAPW>>1,by=sede?sede.gy:MAPH>>1;for(let rad=3;rad<22;rad++)for(let a=0;a<14;a++){const gx=clamp((bx+Math.round((Math.random()*2-1)*rad)),1,MAPW-4),gy=clamp((by+Math.round((Math.random()*2-1)*rad)),1,MAPH-4);if(footprintFree(type,gx,gy))return {gx,gy};}return {gx:2,gy:2};}
/* daily tick */
function endDay(){if(S.over)return;let coNet=0;
  companies.forEach(co=>{co.age++;coNet+=coProfit(co);co.ops=clamp(co.ops-(co.managed?rnd(0.05,0.4):rnd(0.4,1.2)),0,100);co.scale*=rnd(0.998,1.004);const n=NICHES.find(x=>x.id===co.niche);if(chance(n.risk*0.05))co.scale*=rnd(.82,.93);});
  S.cash+=coNet;S.cash-=dailyExpenses();employeeTick();marketTick();rivalTick();
  if(S.day>2&&chance(0.3))fireEvent();
  S.day++;if(S.day%10===0)S.season=SEASONS[(SEASONS.indexOf(S.season)+1)%4];
  if(S.cash<-3000)S.over=true;
  S.peakNet=Math.max(S.peakNet,netWorth());checkPhase();refreshHUD();refreshObj();
  if(S.over)gameOver();}
function employeeTick(){companies.forEach(co=>{for(let i=co.employees.length-1;i>=0;i--){const e=co.employees[i];e.tenure++;const lead=(S.skills.leadership-8)*0.2;e.happy=clamp((e.happy||60)+(co.ops>55?1:-1)+lead*0.3+rnd(-2,2),0,100);if(e.happy<28&&chance(0.13)){co.employees.splice(i,1);removeWorker(co);}}});}
function marketTick(){const m=S.market;m.mood=clamp(m.mood+rnd(-.1,.1),-1,1);if(chance(0.045)){const r=Math.random();if(r<.33){m.cycle="recessão";m.target=.78;m.rate=clamp(m.rate+rnd(.5,2),1,18);log('📉 Recessão em Meridian.');}else if(r<.66){m.cycle="aquecido";m.target=1.28;m.rate=clamp(m.rate-rnd(.3,1.2),1,18);log('📈 Boom! Capital barato.');}else{m.cycle="estável";m.target=1.0;}}m.mult+=(m.target-m.mult)*0.15+m.mood*0.01;m.mult=clamp(m.mult,0.6,1.5);}
function genRival(){const n=pick(NICHES);return {id:'rv'+Date.now()+ri(0,99999),name:coName(n),niche:n.id,value:Math.round(rnd(40000,500000)),drift:rnd(0.985,1.04)};}
function rivalTick(){if(!S.rivals)S.rivals=[];const mf=0.55+S.market.mult*0.45;for(let i=S.rivals.length-1;i>=0;i--){const r=S.rivals[i];r.value=Math.max(8000,Math.round(r.value*r.drift*rnd(0.97,1.04)*mf));if(chance(0.012))S.rivals.splice(i,1);}if(S.rivals.length<6&&chance(0.12))S.rivals.push(genRival());}
function fireEvent(){const big=companies.filter(c=>coValue(c)>120000).sort((a,b)=>coValue(b)-coValue(a))[0];

  if(companies.length&&chance(.5)){const co=pick(companies);co.scale*=rnd(1.04,1.14);toast('📣 '+co.name+' viralizou! Demanda subiu.');}}

function doAcquire(r){const idx=S.rivals.indexOf(r);if(idx<0)return null;const price=Math.round(r.value*1.35);if(S.cash<price)return null;S.cash-=price;const n=NICHES.find(x=>x.id===r.niche);const spot=findFreeSpot(n.spr);const b=placeBuilding(n.spr,spot.gx,spot.gy);

  for(let k=0;k<ri(2,5);k++)addEmployee(co);companies.push(co);S.rivals.splice(idx,1);S.rep.market=clamp(S.rep.market+3,0,100);S.founded++;return co;}
function sellCo(co){const v=coValue(co);modal('🏷️','Vender '+co.name,'<p>Comprador avalia em <b style="color:var(--gold)">'+moneyFull(v)+'</b>.</p>',[{t:'✅ Vender por '+money(v),d:'Exit',fn:()=>{S.cash+=v;removeCompany(co);toast('Exit: '+money(v));checkPhase();refreshHUD();closeModal();}},{t:'↩ Manter',fn:()=>openCompany(co)}]);}

/* ============================ MODAIS / PAINÉIS ============================ */
function modal(ico,title,bodyHTML,actions){closeModal();const sc=document.createElement('div');sc.id='scrim';sc.className='scrim';
  const m=document.createElement('div');m.className='modal panel';m.innerHTML='<div class="mh">'+(ico||'')+' '+title+'</div><div class="mb">'+bodyHTML+'</div>';
  const ab=document.createElement('div');ab.className='mact';(actions||[{t:'Fechar',fn:closeModal}]).forEach(a=>{const btn=document.createElement('button');btn.className='mbtn'+(a.dis?' dis':'');btn.innerHTML='<b>'+a.t+'</b>'+(a.d?'<span>'+a.d+'</span>':'');if(!a.dis)btn.onclick=()=>a.fn&&a.fn();ab.appendChild(btn);});
  m.appendChild(ab);sc.appendChild(m);document.body.appendChild(sc);sc.onclick=e=>{if(e.target===sc)closeModal();};}
function closeModal(){const s=document.getElementById('scrim');if(s)s.remove();}
function kpi(k,v,c){return '<div class="kpi"><div class="k">'+k+'</div><div class="v" style="color:'+(c||'var(--cream)')+'">'+v+'</div></div>';}
function badges(co){return (co.managed?'<span class="tag">🧑‍✈️ gerida</span>':'')+(co.public?'<span class="tag">📊 aberta</span>':'')+(co.acquired?'<span class="tag">🦈 adquirida</span>':'');}
function openCompany(co){const n=NICHES.find(x=>x.id===co.niche);const rev=coRevenue(co),prof=rev-coCosts(co),val=coValue(co),syn=coSynergy(co);
  modal(n.ico,co.name+' · '+n.name,
   '<div class="kpis">'+kpi('Valuation',money(val),'var(--gold)')+kpi('Lucro/dia',(prof>=0?'+':'')+money(prof),prof>=0?'var(--green)':'var(--red)')+kpi('Funcionários',co.employees.length)+kpi('Operação',Math.round(co.ops)+'%')+'</div>'+
   '<div style="margin:6px 0">'+badges(co)+(syn>1.001?'<span class="tag" style="color:var(--gold)">✦ sinergia ×'+syn.toFixed(2)+'</span>':'')+'</div>',
   [{t:'🧑‍💼 Contratar',d:'Talento puxa receita',fn:()=>hireInto(co)},
    {t:'📈 Melhorar operação',d:'+eficiência',fn:()=>{co.ops=clamp(co.ops+ri(8,16),0,100);toast('Operação melhorada');openCompany(co);}},
    co.managed?null:{t:'🧑‍✈️ Contratar gerente',d:'Para de decair sozinha',fn:()=>{manage(co);openCompany(co);}},
    (val>=500000&&!co.public)?{t:'📊 IPO',d:'Abre capital ('+money(Math.round(val*1.4))+')',fn:()=>ipo(co)}:null,
    {t:'🏷️ Vender',d:money(val),fn:()=>sellCo(co)},
    {t:'↩ Fechar',fn:closeModal}].filter(Boolean));}
function openSede(){modal('⭐','Sua Sede — Meridian','<p class="small">O coração do seu império.</p><div class="kpis">'+kpi('Patrimônio',money(netWorth()),'var(--gold)')+kpi('Empresas',companies.length)+kpi('Reputação',Math.round((S.rep.market+S.rep.public)/2))+kpi('Fase',S.phase+'/5')+'</div>',[{t:'🧑‍💼 Ver equipe',fn:openTeam},{t:'📈 Mercado & M&A',fn:openMarket},{t:'↩ Fechar',fn:closeModal}]);}
function openTeam(){const tot=companies.reduce((a,c)=>a+c.employees.length,0);
  modal('🧑‍💼','Equipe — '+tot+' funcionários',companies.length?companies.map(c=>{const n=NICHES.find(x=>x.id===c.niche);const pf=coProfit(c);return '<div class="lrow" data-co="'+c.id+'"><span>'+n.ico+' <b>'+c.name+'</b></span><span class="dim">'+c.employees.length+' func · <span style="color:'+(pf>=0?'var(--green)':'var(--red)')+'">'+(pf>=0?'+':'')+money(pf)+'/d</span></span></div>';}).join(''):'<div class="dim">Sem empresas. Use 🔨 Construir.</div>',[{t:'↩ Fechar',fn:closeModal}]);
  document.querySelectorAll('.lrow[data-co]').forEach(el=>el.onclick=()=>{const c=companies.find(x=>x.id===el.dataset.co);if(c)openCompany(c);});}
function openMarket(){const m=S.market;
  modal('📈','Mercado — Meridian Exchange','<div class="kpis">'+kpi('Ciclo',m.cycle.toUpperCase(),m.cycle==='recessão'?'var(--red)':m.cycle==='aquecido'?'var(--green)':'var(--gold)')+kpi('Multiplic.','×'+m.mult.toFixed(2))+kpi('Juros',m.rate.toFixed(1)+'%')+kpi('Humor',m.mood>.2?'otimista':m.mood<-.2?'pessimista':'neutro')+'</div>'+
   '<div style="color:var(--gold);font-size:11px;letter-spacing:1px;margin:10px 0 2px">🦈 ALVOS DE AQUISIÇÃO (M&A)</div>'+
   ((S.rivals&&S.rivals.length)?S.rivals.slice().sort((a,b)=>b.value-a.value).map(r=>{const n=NICHES.find(x=>x.id===r.niche);const price=Math.round(r.value*1.35);return '<div class="lrow" data-rv="'+r.id+'"><span>'+n.ico+' <b>'+r.name+'</b></span><span class="dim">'+money(r.value)+' · comprar ~<b style="color:var(--gold)">'+money(price)+'</b></span></div>';}).join(''):'<div class="dim">Sem concorrentes no radar.</div>'),
   [{t:'↩ Fechar',fn:closeModal}]);
  document.querySelectorAll('.lrow[data-rv]').forEach(el=>el.onclick=()=>{const r=(S.rivals||[]).find(x=>x.id===el.dataset.rv);if(!r)return;const price=Math.round(r.value*1.35);if(S.cash<price)return toast('Caixa insuficiente');const co=doAcquire(r);if(co){toast('🦈 Adquiriu '+co.name);checkPhase();refreshHUD();openMarket();}});}
function openObjectives(){const o=currentObjective();modal('📋','Objetivos · Fase '+S.phase+' ('+S.phaseName+')',o.objs.map(ob=>{const p=Math.min(100,ob.cur/ob.max*100);return '<div class="lab"><span>'+ob.lab+'</span><b>'+(ob.money?money(ob.cur)+'/'+money(ob.max):ob.cur+'/'+ob.max)+'</b></div><div class="bar g"><i style="width:'+p+'%"></i></div>';}).join(''),[{t:'↩ Fechar',fn:closeModal}]);}
function openSettings(){modal('⚙️','Ajustes','<p class="small">Business Simulator · protótipo 2D top-down, com a economia validada rodando por baixo dos prédios.</p>',[{t:'🔄 Reiniciar jogo',d:'Começa do zero',fn:()=>location.reload()},{t:'↩ Fechar',fn:closeModal}]);}
function gameOver(){modal('💀','Falência','<p>Os credores venceram. Patrimônio de pico: <b style="color:var(--gold)">'+money(S.peakNet)+'</b> · '+S.day+' dias.</p>',[{t:'🔄 Recomeçar',fn:()=>location.reload()}]);}
/* objetivos dinâmicos (por fase) */
function currentObjective(){const p=S.phase,net=netWorth();const np=PHASES.find(ph=>ph.n===p+1);const emp=workers.filter(w=>w.co).length;
  const objs=[{lab:'Empresas no distrito',cur:companies.length,max:Math.max(companies.length,p+2)},{lab:'Funcionários',cur:emp,max:Math.max(30,emp)}];
  if(np)objs.push({lab:'Patrimônio → '+np.name,cur:Math.min(net,np.net),max:np.net,money:true});
  const quest=companies.length===0?'Funde sua primeira empresa':np?('Chegue à fase “'+np.name+'” ('+money(np.net)+')'):'Construa seu legado — você chegou ao topo';
  return {quest,objs};}
/* ============================ HUD ============================ */
function icon(draw){const {c,g}=makeCanvas(18,18);draw(g);return c.toDataURL();}
const IC={
  cash:icon(g=>{g.fillStyle='#e8c060';g.beginPath();g.arc(9,9,7,0,7);g.fill();g.fillStyle='#f4d888';g.beginPath();g.arc(9,9,4,0,7);g.fill();g.fillStyle='#b8901a';g.fillRect(8,5,2,8);}),
  emp:icon(g=>{g.fillStyle='#8fd07a';g.beginPath();g.arc(9,6,3,0,7);g.fill();g.fillRect(5,10,8,6);}),
  rep:icon(g=>{g.fillStyle='#e88a5a';g.beginPath();for(let i=0;i<5;i++){const a=-Math.PI/2+i*2*Math.PI/5;g.lineTo(9+Math.cos(a)*7,9+Math.sin(a)*7);const b=a+Math.PI/5;g.lineTo(9+Math.cos(b)*3,9+Math.sin(b)*3);}g.closePath();g.fill();}),
};
function res(ic,v){return '<span class="res"><img class="ic" src="'+ic+'">'+v+'</span>';}
function refreshHUD(){const empC=workers.filter(w=>w.co).length,cap=40+S.phase*20;
  document.getElementById('hudTop').innerHTML=res(IC.cash,money(S.cash))+res(IC.emp,empC+'/'+cap)+res(IC.rep,'Rep '+Math.round((S.rep.market+S.rep.public)/2))+'<span class="res" style="color:var(--green)">🏢 '+companies.length+'</span>'+'<span class="res" style="color:var(--gold)">◆ '+money(netWorth())+'</span>';
  document.getElementById('dayTxt').textContent='Dia '+S.day+' · '+S.season;
  document.getElementById('phaseTxt').textContent='Fase '+S.phase+' · '+S.phaseName;
  document.getElementById('questTxt').textContent=currentObjective().quest;}
function refreshObj(){const o=currentObjective();document.getElementById('objPanel').innerHTML='<div style="color:var(--gold);font-size:11px;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">Objetivos</div>'+o.objs.map(ob=>{const p=Math.min(100,ob.cur/ob.max*100);return '<div class="row"><div class="lab"><span>'+ob.lab+'</span><b>'+(ob.money?money(ob.cur)+'/'+money(ob.max):ob.cur+'/'+ob.max)+'</b></div><div class="bar g"><i style="width:'+p+'%"></i></div></div>';}).join('');}
function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('on');clearTimeout(toast._t);toast._t=setTimeout(()=>el.classList.remove('on'),1600);}
function showHint(t){const h=document.getElementById('hint');h.textContent=t;h.classList.add('on');clearTimeout(showHint._t);showHint._t=setTimeout(()=>h.classList.remove('on'),2600);}
/* ============================ TOOLBAR + BUILD ============================ */
const TOOLS=[{k:'build',ic:'🔨',l:'Construir'},{k:'emp',ic:'🧑‍💼',l:'Equipe'},{k:'obj',ic:'📋',l:'Objetivos'},{k:'market',ic:'📈',l:'Mercado'},{k:'set',ic:'⚙️',l:'Ajustes'},{k:'map',ic:'🗺️',l:'Mapa'}];
const BUILD=NICHES.map(n=>({id:n.id,spr:n.spr,name:n.name,ic:n.ico,cost:Math.round((n.cost[0]+n.cost[1])/2)}));
function buildToolbar(){document.getElementById('toolbar').innerHTML=TOOLS.map(t=>'<div class="tool" data-k="'+t.k+'"><div class="ti">'+t.ic+'</div><div class="tl">'+t.l+'</div></div>').join('');
  document.querySelectorAll('.tool').forEach(el=>el.onclick=()=>onTool(el.dataset.k,el));}
function onTool(k,el){document.querySelectorAll('.tool').forEach(t=>t.classList.remove('on'));const tray=document.getElementById('tray');
  if(k==='build'){const open=!tray.classList.contains('on');placing=null;if(open){el.classList.add('on');openBuildTray();}else{tray.classList.remove('on');}return;}
  tray.classList.remove('on');placing=null;
  if(k==='emp')openTeam();else if(k==='obj')openObjectives();else if(k==='market')openMarket();else if(k==='set')openSettings();else if(k==='map'){centerOnHero();toast('📍 Câmera no seu personagem');}}
function openBuildTray(){const tray=document.getElementById('tray');tray.classList.add('on');
  tray.innerHTML=BUILD.map(d=>{const no=S.cash<d.cost?' no':'';return '<div class="card'+no+'" data-t="'+d.id+'"><canvas width="56" height="56" data-spr="'+d.spr+'"></canvas><div class="cn">'+d.ic+' '+d.name+'</div><div class="cc">'+money(d.cost)+'</div></div>';}).join('');
  tray.querySelectorAll('canvas').forEach(cn=>{const s=BSPRITES[cn.dataset.spr];const g=cn.getContext('2d');g.imageSmoothingEnabled=false;const sc=Math.min(56/s.c.width,56/s.c.height);const w=s.c.width*sc,h=s.c.height*sc;g.drawImage(s.c,(56-w)/2,(56-h)/2,w,h);});
  tray.querySelectorAll('.card').forEach(cd=>{if(cd.classList.contains('no'))return;cd.onclick=()=>{placing=BUILD.find(d=>d.id===cd.dataset.t);showHint('Toque no mapa para fundar · '+placing.name+' ('+money(placing.cost)+')');};});}
function tryPlace(gx,gy){const d=placing;if(!footprintFree(d.spr,gx,gy))return toast('Espaço ocupado');if(S.cash<d.cost)return toast('Caixa insuficiente');
  const co=foundCompany(d.id,gx,gy,d.cost,false);toast(co.name+' fundada · -'+money(d.cost));refreshHUD();refreshObj();}
/* ============================ BOOT ============================ */
genWorld();
companies.forEach(c=>{c.ops=rnd(68,82);c.scale=rnd(1.15,1.45);}); // distrito inicial já operante e lucrativo
for(let i=0;i<4;i++)S.rivals.push(genRival());
centerOnHero();buildToolbar();refreshHUD();refreshObj();
setTimeout(()=>showHint('👤 Este é VOCÊ (anel dourado). Toque no chão para andar · 🗺️ Mapa te leva até você.'),400);
setInterval(()=>{if(!S.over)endDay();},5500); // o tempo passa: economia avança
requestAnimationFrame(loop);
window.__townReady=true;
</script>
</body>
</html>
