; MOGUL (Project ATLAS) — engine config scaffold.
; Mirrors docs/10-TECHNICAL-ARCHITECTURE.md: Lumen + Nanite + World Partition.

[/Script/EngineSettings.GameMapsSettings]
; NOTE: create these maps in-editor (Maps/), then re-point. Left blank so the
; project opens to an empty level instead of erroring on a missing asset.
GameDefaultMap=/Engine/Maps/Templates/OpenWorld
EditorStartupMap=/Engine/Maps/Templates/OpenWorld
GlobalDefaultGameMode=/Script/MOGUL.MogulGameModeBase

[/Script/Engine.RendererSettings]
; --- Lumen (dynamic global illumination & reflections) ---
r.DynamicGlobalIlluminationMethod=1
r.ReflectionMethod=1
r.Lumen.HardwareRayTracing=0
; --- Nanite (virtualized geometry) ---
r.Nanite.ProjectEnabled=True
r.RayTracing=False
; --- Shadows / Virtual Shadow Maps (recommended with Nanite/Lumen) ---
r.Shadow.Virtual.Enable=1
; --- Defaults suited to a dense city ---
r.DefaultFeature.AutoExposure=True
r.GenerateMeshDistanceFields=True
; --- AAA fidelity target (see docs/13-ART-DIRECTION.md) ---
r.Lumen.Reflections.Allow=1
r.Lumen.ScreenProbeGather.RadianceCache=1
r.AntiAliasingMethod=4            ; TSR (Temporal Super Resolution)
r.VirtualTextures=1
r.VirtualTexturedLightmaps=1
r.SkyAtmosphere=1
r.VolumetricFog=1
r.DefaultFeature.MotionBlur=True
r.MotionBlurQuality=4
r.DefaultFeature.AmbientOcclusion=True
r.DefaultFeature.Bloom=True
r.DefaultFeature.AutoExposure.Method=0   ; histogram-based eye adaptation
r.DefaultFeature.AutoExposure.ExtendDefaultLuminanceRange=True ; physical light units (lux sun etc.)
r.Tonemapper.Quality=5

[/Script/WorldPartitionEditor.WorldPartitionEditorSettings]
CommandletClass=Class'/Script/UnrealEd.WorldPartitionConvertCommandlet'

[/Script/Engine.Engine]
; Use our GameInstance so the global subsystems (Economy/Agents/Sim/Save) spin up.
GameInstanceClass=/Script/MOGUL.MogulGameInstance

[/Script/AIModule.AISystem]
; StateTree/Mass-based agent decisioning lives in the MOGUL module (Tier 2/3).

[/Script/HardwareTargeting.HardwareTargetingSettings]
TargetedHardwareClass=Desktop
AppliedTargetedHardwareClass=Desktop
DefaultGraphicsPerformance=Maximum
AppliedDefaultGraphicsPerformance=Maximum
